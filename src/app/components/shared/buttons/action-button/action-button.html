<button (click)="buttonClicked()" matButton="filled" [disabled]="disabled"
    class="w-full !rounded-xl shadow shadow-black"
    [ngClass]="variant === 'primary' 
      ? 'border !bg-blue-500 !text-white hover:!bg-white hover:!text-blue-500'
      : 'border !bg-white !text-blue-500 hover:!text-red-400'">
    {{buttonText}}
</button>
