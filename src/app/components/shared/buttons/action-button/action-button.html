<button (click)="buttonClicked()" matButton="filled" [disabled]="disabled"
    class="w-full !rounded-xl shadow shadow-black"
    [ngClass]="variant === 'primary' 
      ? 'action-button-primary border !bg-blue-500 !text-white'
      : 'action-button-secondary border border-blue-500 !bg-white !text-blue-500'">
    {{buttonText}}
</button>
