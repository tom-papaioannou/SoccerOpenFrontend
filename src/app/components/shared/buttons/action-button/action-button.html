<button (click)="buttonClicked()" matButton="filled" [disabled]="disabled"
    [class]="variant === 'primary' 
      ? 'w-full border !bg-blue-500 !text-white !rounded-xl hover:!bg-white hover:!text-blue-500 shadow shadow-black'
      : 'w-full border border-blue-500 !bg-white !text-blue-500 !rounded-xl hover:!bg-blue-500 hover:!text-white shadow shadow-black'">
    {{buttonText}}
</button>
