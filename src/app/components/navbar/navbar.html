<mat-toolbar>
  <div class="h-[50px] flex items-center justify-center">
    <span class="brand hidden md:inline">SoccerOS</span>
    <img src="assets/images/SoccerOS.webp" alt="SoccerOS Logo" class="h-[70%]" />
  </div>

  @if (loggedIn && currentUser) {
    <div class="topbar-profile" aria-label="Current user">
      <span class="profile-username">{{ currentUser.username }}</span>
      <span class="profile-role">{{ profileSubtitle }}</span>
    </div>
  }

  <span class="spacer"></span>
  @if(isMobile){
    <button mat-button [matMenuTriggerFor]="menu">
      More
      <mat-icon>expand_more</mat-icon>
    </button>

    <mat-menu #menu="matMenu">
      @if(role === "User"){
        <button mat-menu-item routerLink="">Home</button>
        <button mat-menu-item routerLink="team">Team</button>
        <button mat-menu-item routerLink="team/tactics">Tactics</button>
        <button mat-menu-item routerLink="competitions">Competitions</button>
      }
      @else if(role === "Host"){
        <button mat-menu-item routerLink="">Dashboard</button>
        @if (authService.currentServerID) {
          <button mat-menu-item [routerLink]="'/server/' + authService.currentServerID">Server</button>
        }
        <button mat-menu-item routerLink="competitions-management">Competitions</button>
        <button mat-menu-item routerLink="about">Teams</button>
      }
      @else if(role === "Admin"){
        <button mat-menu-item routerLink="adminpanel">Admin</button>
        <button mat-menu-item routerLink="servers">Servers</button>
        <button mat-menu-item routerLink="admin/register-host">Register Host</button>
        <button mat-menu-item routerLink="about">Logs</button>
      }
      <button mat-menu-item routerLink="contact">Account</button>
      <button mat-menu-item routerLink="contact">Contact</button>
      <button mat-menu-item routerLink="help">Help</button>
      <button mat-menu-item routerLink="help">Settings</button>
      <button mat-menu-item (click)="testConnection()">Test</button>
      <button mat-menu-item (click)="logOut()">Sign Out</button>
    </mat-menu>
  }
</mat-toolbar>
