<div class="information-card-wrapper">
  <div class="information-card rounded-lg shadow-sm border p-4 sm:p-6">
    <h2 class="font-bold mb-4 text-left">Information</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <p class="text-xs uppercase text-gray-500">Name</p>
        <p class="text-base">{{ team?.name ?? '-' }}</p>
      </div>
      <div>
        <p class="text-xs uppercase text-gray-500">Stadium</p>
        <p class="text-base">{{ team?.stadium?.name ?? '-' }}</p>
      </div>
      <div>
        <p class="text-xs uppercase text-gray-500">City</p>
        <p class="text-base">{{ team?.stadium?.city ?? '-' }}</p>
      </div>
    </div>
  </div>
</div>
