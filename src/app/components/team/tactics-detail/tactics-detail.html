<div class="tactics-detail-container p-4">
  <!-- Header with Back Button -->
  <div class="mb-6 flex items-center gap-4">
    <button mat-icon-button (click)="goBack()" aria-label="Go back to tactics">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2 class="text-2xl font-bold">Tactic Details</h2>
  </div>

  <!-- Error Message -->
  @if (error()) {
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      {{ error() }}
    </div>
  }

  <!-- Loading Indicator -->
  @if (loading()) {
    <div class="flex justify-center items-center py-8">
      <div class="text-lg">Loading...</div>
    </div>
  }

  <!-- Content: Tactic Card and Players Table -->
  @if (!loading() && tactic()) {
    <div class="content-grid">
      <!-- Left Side: Tactic Card -->
      <div class="tactic-section">
        <mat-card class="tactic-card" [class.main-tactic]="tactic()?.isMain">
          <mat-card-content class="tactic-card-content">
            <div class="tactic-name flex">
              {{ tactic()?.name }}
              @if (tactic()?.isMain) {
                <span class="main-asterisk">*</span>
              }
            </div>
            <img [src]="getFormationImagePath(tactic()?.formation)" alt="Tactics formation" class="tactic-image" />
          </mat-card-content>
        </mat-card>
      </div>

      <!-- Right Side: Players Table -->
      <div class="players-section">
        @if (tableData.length > 0) {
          <app-data-table
            [data]="tableData"
            [columns]="displayedColumns"
            [initialSort]="{ active: 'position', direction: 'asc' }">
          </app-data-table>
        } @else {
          <div class="text-gray-500 text-center py-8">
            No players assigned to this tactic yet.
          </div>
        }
      </div>
    </div>
  }
</div>
