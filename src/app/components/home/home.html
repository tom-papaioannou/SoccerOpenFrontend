<div class="flex w-full">
    <div class="p-2 flex w-3/7">
        <div class="flex-1 rounded-xl border-1 p-3 tableBorder flex">
            <div class="flex-col flex-1">
                <div class="py-2">
                    <img src="assets\images\Blue_Team_Logo.png" class="block border rounded border-gray-900 bg-gray-900"/>
                </div>
            </div>
            <div class="flex-col flex-1">
                <div class="h-1/3 flex flex-col justify-center items-center">
                    <span class="font-bold text-lg">Blue Team FC</span>
                    <span class="text-sm">2nd in League 1</span>
                </div>
                <div class="flex flex-col h-1/3">
                    <span class="underline">Next Fixture</span>
                    <div class="py-2 flex flex-col items-center">
                        <div class="flex w-full">
                            <span class="w-full text-right">Opponent:</span>
                            <span class="w-full px-3 text-left">Red Ones (H)</span>
                        </div>
                        <div class="flex w-full">
                            <span class="w-full text-right">Weather:</span>
                            <span class="w-full px-3 text-left">Clear, 24 °C</span>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col h-1/3">
                    <span class="underline">Form</span>
                    <div class="py-2 flex justify-center">
                        <div class="px-1">
                            <div class="border rounded flex items-center justify-center w-6 h-6">
                                <span>W</span>
                            </div>
                        </div>
                        <div class="px-1">
                            <div class="border rounded flex items-center justify-center w-6 h-6">
                                <span>W</span>
                            </div>
                        </div>
                        <div class="px-1">
                            <div class="border rounded flex items-center justify-center w-6 h-6">
                                <span>D</span>
                            </div>
                        </div>
                        <div class="px-1">
                            <div class="border rounded flex items-center justify-center w-6 h-6">
                                <span>L</span>
                            </div>
                        </div>
                        <div class="px-1">
                            <div class="border rounded flex items-center justify-center w-6 h-6">
                                <span>D</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="p-2 w-2/7">
        <app-data-table
            [data]="people"
            [columns]="$any(displayedColumns)">
        </app-data-table>
    </div>
    <div class="p-2 w-2/7">
        <app-data-table
            [data]="fixtures"
            [columns]="$any(displayedColumnsFixtures)">
        </app-data-table>
    </div>
</div>
