<div class="grid grid-cols-1 lg:grid-cols-7 w-full dashboard-grid">
  <div class="p-2 lg:col-span-2 max-w-[600px] min-w-0 dashboard-column">
    <div class="rounded-xl border-1 p-3 tableBorder flex">
      <div class="flex-col flex-1">
        <div class="py-2">
          <img src="assets/images/Blue_Team_Logo.png" class="dashboard-team-logo block border rounded border-gray-900 bg-gray-900 w-auto h-auto"/>
        </div>
      </div>

      <div class="flex-col flex-1 flex justify-center">
        <div class="flex flex-col justify-center items-center">
          <span class="font-bold text-lg">{{teamName}}</span>
          <span class="text-sm">
            2nd in
            <button
              type="button"
              class="dashboard-competition-link"
              [disabled]="!competitionID"
              (click)="openCompetition()">
              {{competitionName}}
            </button>
          </span>
        </div>

        <div class="flex flex-col">
          <span class="underline">Next Fixture</span>
          <div class="py-2 flex flex-col items-center">
            <div class="flex w-full">
              <span class="w-full font-bold">Red Ones (H)</span>
            </div>
            <div class="flex w-full">
              <span class="w-full">Clear, 24 °C</span>
            </div>
          </div>
        </div>

        <div class="flex flex-col h-1/3">
          <span class="underline">Form</span>
          <div class="py-2 flex justify-center">
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>W</span>
              </div>
            </div>
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>W</span>
              </div>
            </div>
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>D</span>
              </div>
            </div>
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>L</span>
              </div>
            </div>
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>D</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="rounded-xl border-1 p-3 tableBorder flex mt-4 dashboard-kits-card">
      <div class="dashboard-kits-content">
        <section class="dashboard-team-information">
          <h2 class="font-bold">Information</h2>
          <div class="dashboard-team-information-grid">
            <div>
              <p class="text-xs uppercase text-gray-500">Stadium</p>
              <p class="text-base">{{stadiumName}}</p>
            </div>
            <div>
              <p class="text-xs uppercase text-gray-500">City</p>
              <p class="text-base">{{stadiumCity}}</p>
            </div>
          </div>
        </section>

        <section class="dashboard-kits-section">
          <p class="text-xs uppercase text-gray-500">Kits</p>
        
          <div class="dashboard-kit-previews">

            <div class="kit-preview px-8">
              <span class="py-2">Home</span>
              <app-team-kit [kit]="kit" [isHome]="true"></app-team-kit>
            </div>

            <div class="kit-preview px-8">
              <span class="py-2">Away</span>
              <app-team-kit [kit]="kit" [isHome]="false"></app-team-kit>
            </div>
          </div>

        </section>
      </div>
    </div>
  </div>

  @if(showPlayersTable){
    <div
      class="p-2 lg:col-span-2 max-w-[600px] min-w-0 dashboard-column dashboard-table dashboard-link-table"
      role="button"
      tabindex="0"
      aria-label="Open squad"
      (click)="openSquad()"
      (keydown.enter)="openSquad()"
      (keydown.space)="openSquad()">
      <app-data-table
        [data]="people"
        [columns]="$any(displayedColumns)">
      </app-data-table>
    </div>
  }

  <div
    class="p-2 lg:col-span-2 max-w-[600px] min-w-0 dashboard-column dashboard-table dashboard-fixtures-column dashboard-link-table"
    role="button"
    tabindex="0"
    aria-label="Open fixtures"
    (click)="openFixtures()"
    (keydown.enter)="openFixtures()"
    (keydown.space)="openFixtures()">
    <app-data-table
      class="dashboard-fixtures-table"
      [data]="fixtures"
      [columns]="$any(displayedColumnsFixtures)">
    </app-data-table>
  </div>
</div>
