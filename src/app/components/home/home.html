<div class="grid grid-cols-1 lg:grid-cols-7 w-full">
  <div class="p-2 lg:col-span-3 max-w-[600px]">
    <div class="rounded-xl border-1 p-3 tableBorder flex">
      <div class="flex-col flex-1">
        <div class="py-2">
          <img src="assets/images/Blue_Team_Logo.png" class="block border rounded border-gray-900 bg-gray-900 max-h-[200px] max-w-[200px] w-auto h-auto"/>
        </div>
      </div>

      <div class="flex-col flex-1 flex justify-center">
        <div class="flex flex-col justify-center items-center">
          <span class="font-bold text-lg">{{teamName}}</span>
          <span class="text-sm">2nd in League 1</span>
        </div>

        <div class="flex flex-col">
          <span class="underline">Next Fixture</span>
          <div class="py-2 flex flex-col items-center">
            <div class="flex w-full">
              <span class="w-full font-bold">Red Ones (H)</span>
            </div>
            <div class="flex w-full">
              <span class="w-full">Clear, 24 °C</span>
            </div>
          </div>
        </div>

        <div class="flex flex-col h-1/3">
          <span class="underline">Form</span>
          <div class="py-2 flex justify-center">
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>W</span>
              </div>
            </div>
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>W</span>
              </div>
            </div>
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>D</span>
              </div>
            </div>
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>L</span>
              </div>
            </div>
            <div class="px-1">
              <div class="border rounded flex items-center justify-center w-6 h-6">
                <span>D</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="p-2 lg:col-span-2 max-w-[600px]">
    <app-data-table
      [data]="people"
      [columns]="$any(displayedColumns)">
    </app-data-table>
  </div>

  <div class="p-2 lg:col-span-2 max-w-[600px]">
    <app-data-table
      [data]="fixtures"
      [columns]="$any(displayedColumnsFixtures)">
    </app-data-table>
  </div>
</div>
