<div class="w-full h-full flex flex-row justify-center items-center">
    <mat-card class="overlay" appearance="outlined">
        <div class="py-8">
            <form [formGroup]="registerForm" (ngSubmit)="register()">
                <div class="w-96 h-62 flex flex-col justify-center items-center">
                    <app-form-textfield class="w-full px-8" formControlName="username" labelText="Username" placeHolderText="Username"></app-form-textfield>
                    <app-form-textfield class="w-full px-8" formControlName="password" type="password" [showToggle]="true" labelText="Password" placeHolderText="Password"></app-form-textfield>
                    <app-form-textfield class="w-full px-8" formControlName="confirmPassword" type="password" [showToggle]="true" labelText="Confirm Password" placeHolderText="Confirm Password"></app-form-textfield>
                    <app-form-dropdown class="w-full px-8" formControlName="role" labelText="Role" placeHolderText="Select Role" [options]="roleOptions"></app-form-dropdown>
                </div>
            </form>
        </div>
        <div class="flex flex-col justify-center p-8">
            <div class="py-4">
                <app-action-button (clicked)="register()" [buttonText]="'Register'"></app-action-button>
            </div>
        </div>
    </mat-card>
</div>
