@if (signedIn) {
  <app-navbar [isMobile]="isMobile"></app-navbar>
}

<div class="app-layout">
  @if(signedIn && !isMobile) {
    <aside class="sidebar">
      <nav class="menu">
        @if(role === "User"){
          <a routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
          <a routerLink="team/squad" routerLinkActive="active">Squad</a>
          <a routerLink="team/fixtures" routerLinkActive="active">Fixtures</a>
          <a routerLink="team/tactics" routerLinkActive="active">Tactics</a>
          <a routerLink="competitions" routerLinkActive="active">Competitions</a>
        }
        @else if(role === "Host"){
          @if (authService.currentServerID) {
            <a [routerLink]="'/server/' + authService.currentServerID" routerLinkActive="active">Server</a>
          }
          <a routerLink="competitions-management" routerLinkActive="active">Competitions</a>
        }
        @else if(role === "Admin"){
          <a routerLink="adminpanel" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Admin</a>
          <a routerLink="admin/register-host" routerLinkActive="active">Register</a>
          <a routerLink="servers" routerLinkActive="active">Servers</a>
          <a routerLink="about" routerLinkActive="active">Logs</a>
        }
        <a (click)="logOut()" class="cursor-pointer">Sign Out</a>
      </nav>
    </aside>
  }
  <main class="page overlay flex-1 w-full">
    <router-outlet></router-outlet>
  </main>
</div>
